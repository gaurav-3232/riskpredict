# Render Blueprint — render.yaml
# Deploy with: https://render.com/deploy

services:
  # ── Backend API ──
  - type: web
    name: riskpredict-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerTarget: production
    region: oregon
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: riskpredict-db
          property: connectionString
      - key: MODELS_DIR
        value: /app/storage/models
      - key: DATASETS_DIR
        value: /app/storage/datasets
      - key: CORS_ORIGINS
        value: '["https://riskpredict-web.onrender.com"]'
      - key: LOG_LEVEL
        value: WARNING
      - key: ENVIRONMENT
        value: production
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: model-storage
      mountPath: /app/storage
      sizeGB: 1
    healthCheckPath: /health
    buildCommand: ""
    startCommand: "sh -c 'alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2'"

  # ── Frontend ──
  - type: web
    name: riskpredict-web
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /api/*
        destination: https://riskpredict-api.onrender.com/*
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: riskpredict-db
    plan: starter
    databaseName: riskpredict
    region: oregon
